<style>
:root{
  --accent:#CC1400;--accent-soft:#B01200;--accent-muted:rgba(204,20,0,0.06);
  --text:#121212;--text-secondary:#555555;--text-muted:#888888;
  --border:#D9D9D9;--border-light:#EEEEEE;
  --bg:#FFFFFF;--surface:#F7F7F5;
  --row-m:#FFF8E7;--row-e:#E7F0FF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans JP","Hiragino Sans",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;font-feature-settings:"palt"}
.top-bar{position:sticky;top:0;z-index:100;background:var(--bg);border-top:3px solid #121212;border-bottom:1px solid var(--border-light);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;height:56px}
.brand{font-weight:700;font-size:13px;color:var(--accent);letter-spacing:0.05em}
.search{padding:6px 10px;border:1px solid var(--border);border-radius:2px;font-family:inherit;font-size:12px;width:240px}
main{max-width:1100px;margin:0 auto;padding:32px 24px 80px}
h1{font-family:"Noto Serif JP",serif;font-size:28px;margin-bottom:8px}
.subtitle{color:var(--text-secondary);font-size:13px;margin-bottom:28px}
.subtitle a{color:var(--accent);text-decoration:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);padding:14px 18px;border-left:3px solid var(--accent);border-radius:2px}
.stat-num{font-size:24px;font-weight:700;color:var(--accent);font-family:"Noto Serif JP",serif}
.stat-label{font-size:11px;color:var(--text-secondary);letter-spacing:0.05em;margin-top:2px}
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:12px;border-radius:2px;font-family:inherit}
.filter-btn:hover{background:var(--surface)}
.filter-btn.active{background:var(--accent);color:#FFFFFF;border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--accent);color:#FFFFFF;padding:10px;text-align:left;font-weight:500;font-size:12px;letter-spacing:0.05em;border:1px solid var(--accent-soft)}
tbody td{padding:10px;border:1px solid var(--border-light);vertical-align:middle}
tbody tr.row-m{background:var(--row-m)}
tbody tr.row-e{background:var(--row-e)}
tbody tr:hover{background:var(--surface)}
.rank-badge{font-family:"SF Mono",monospace;font-size:11px;color:var(--text-secondary);font-weight:700}
.org-badge{display:inline-block;padding:2px 8px;font-size:10px;font-weight:700;border-radius:2px;letter-spacing:0.05em}
.org-m{background:#A24F8E;color:#FFFFFF}
.org-e{background:#5B5BD6;color:#FFFFFF}
.title-link{color:var(--text);text-decoration:none;font-weight:500;font-size:13px}
.title-link:hover{color:var(--accent)}
.size{font-size:11px;color:var(--text-muted);font-family:"SF Mono",monospace}
.actions{display:flex;gap:6px}
.btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);background:var(--bg);cursor:pointer;text-decoration:none;color:var(--text);border-radius:2px;display:inline-block;font-family:inherit}
.btn:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#FFFFFF;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-soft);color:#FFFFFF}
.note-banner{background:var(--accent-muted);border-left:3px solid var(--accent);padding:12px 16px;margin-bottom:24px;font-size:13px;color:var(--text-secondary);line-height:1.7}
.note-banner strong{color:var(--accent)}
@media (max-width:780px){
  .stats{grid-template-columns:1fr 1fr}
  table{font-size:11px}
  .actions{flex-direction:column}
}
</style>

];

let currentFilter = 'all';
let currentSearch = '';

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let filtered = DRAFTS;
  if (currentFilter === 'm') filtered = DRAFTS.filter(d => d.code === 'M');
  if (currentFilter === 'e') filtered = DRAFTS.filter(d => d.code === 'E');
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(d => d.title.toLowerCase().includes(q) || d.org.toLowerCase().includes(q));
  }
  filtered.forEach(d => {
    const tr = document.createElement('tr');
    tr.className = d.code === 'M' ? 'row-m' : 'row-e';
    const sizeKB = (d.size / 1024).toFixed(1);
    const orgClass = d.code === 'M' ? 'org-m' : 'org-e';
    tr.innerHTML =
      `<td><span class="rank-badge">${d.rank}</span></td>` +
      `<td><span class="org-badge ${orgClass}">${d.org}</span></td>` +
      `<td><a class="title-link" href="${encodeURIComponent(d.filename)}">${escapeHtml(d.title)}</a></td>` +
      `<td><span class="size">${sizeKB} KB</span></td>` +
      `<td class="actions">` +
        `<a class="btn btn-primary" href="${encodeURIComponent(d.filename)}" target="_blank">開く</a>` +
        `<a class="btn" href="${encodeURIComponent(d.filename)}" download>DL</a>` +
      `</td>`;
    tbody.appendChild(tr);
  });
  // サマリー
  document.getElementById('totalNum').textContent = DRAFTS.length;
  document.getElementById('mNum').textContent = DRAFTS.filter(d => d.code === 'M').length;
  document.getElementById('eNum').textContent = DRAFTS.filter(d => d.code === 'E').length;
  const totalKB = (DRAFTS.reduce((s, d) => s + d.size, 0) / 1024).toFixed(0);
  document.getElementById('totalSize').textContent = totalKB + ' KB';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

render();
