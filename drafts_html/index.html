let currentFilter = 'all';
let currentSearch = '';

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let filtered = DRAFTS;
  if (currentFilter === 'm') filtered = DRAFTS.filter(d => d.code === 'M');
  if (currentFilter === 'e') filtered = DRAFTS.filter(d => d.code === 'E');
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(d => d.title.toLowerCase().includes(q) || d.org.toLowerCase().includes(q));
  }
  filtered.forEach(d => {
    const tr = document.createElement('tr');
    tr.className = d.code === 'M' ? 'row-m' : 'row-e';
    const sizeKB = (d.size / 1024).toFixed(1);
    const orgClass = d.code === 'M' ? 'org-m' : 'org-e';
    tr.innerHTML =
      `<td><span class="rank-badge">${d.rank}</span></td>` +
      `<td><span class="org-badge ${orgClass}">${d.org}</span></td>` +
      `<td><a class="title-link" href="${encodeURIComponent(d.filename)}">${escapeHtml(d.title)}</a></td>` +
      `<td><span class="size">${sizeKB} KB</span></td>` +
      `<td class="actions">` +
        `<a class="btn btn-primary" href="${encodeURIComponent(d.filename)}" target="_blank">開く</a>` +
        `<a class="btn" href="${encodeURIComponent(d.filename)}" download>DL</a>` +
      `</td>`;
    tbody.appendChild(tr);
  });
  // サマリー
  document.getElementById('totalNum').textContent = DRAFTS.length;
  document.getElementById('mNum').textContent = DRAFTS.filter(d => d.code === 'M').length;
  document.getElementById('eNum').textContent = DRAFTS.filter(d => d.code === 'E').length;
  const totalKB = (DRAFTS.reduce((s, d) => s + d.size, 0) / 1024).toFixed(0);
  document.getElementById('totalSize').textContent = totalKB + ' KB';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

render();
</script>
